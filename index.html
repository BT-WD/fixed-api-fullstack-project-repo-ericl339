<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Explorer</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <h1>NASA Space Explorer</h1>
        <p>Click the button to load a random Astronomy Picture of the Day.</p>
        <button id="loadButton" type="button">Show a Random Space Image</button>
      </section>

      <section id="result" class="result hidden">
        <div class="media-container" id="mediaContainer"></div>
        <div class="info-panel">
          <div class="title-section">
            <h2 id="title"></h2>
            <button id="favoriteButton" class="favorite-button" type="button" title="Add to favorites">Favorite</button>
          </div>
          <p id="date"></p>
          <p id="description"></p>
        </div>
      </section>

      <section id="favorites" class="favorites hidden">
        <div class="favorites-header">
          <h3>Favorites</h3>
          <button id="closeFavoritesButton" class="close-button" type="button" aria-label="Close favorites">✕</button>
        </div>
        <div id="favoritesList" class="favorites-list"></div>
      </section>

      <button id="viewFavoritesButton" class="view-favorites-button hidden" type="button">View Favorites</button>

      <section id="error" class="error hidden"></section>
    </main>

    <script src="index.js" defer></script>
  </body>
</html>
